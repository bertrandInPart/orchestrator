# .orchestrator/manifest.yml
#
# The packaging manifest read by .orchestrator/scripts/install.py. It's the full list of files
# this template ships, each tagged with how the installer should treat a conflict with a file
# that already exists at that path in the project being adopted into — this is what makes install
# safe to run against an "already industrialized" project that has its own CI, its own
# `.github/copilot-instructions.md`, its own issue templates, etc., instead of a blank repo.
#
# category: core        — the chain's own logic (chatmodes/skills/instructions/scripts/evals).
#                          An adopting project is not expected to already have a file at this
#                          path; if it somehow does, or if a later `install.py --update` finds the
#                          file has been hand-edited since install, the installer never overwrites
#                          it silently — it writes the incoming version alongside as
#                          `<name>.orchestrator-suggested<ext>` and flags it for manual review.
# category: integration  — files that commonly already exist in a real project (CI workflows,
#                          repo-wide Copilot instructions, an issue template) and where a
#                          wholesale overwrite would very likely destroy existing project setup.
#                          Same non-destructive rule as `core`, but the installer's summary calls
#                          these out explicitly as "needs manual merge," since the expected action
#                          isn't just "review, probably fine" but "combine the two by hand."
# category: seed         — starter/append-only files (empty memory logs, telemetry, baseline eval
#                          results) that a project is expected to grow on its own after adoption.
#                          Created only if missing; never flagged as a conflict, never
#                          auto-updated, even if unmodified.

